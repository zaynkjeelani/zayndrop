<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zayndrop List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0f; --bg2: #151517; --bg3: #1d1d20;
      --border: #26262a; --border2: #35353b;
      --text: #e8e8e6; --text2: #8a8a88; --text3: #4a4a48;
      --accent: #c8f04a; --accent2: #a8cc35;
      --warn: #f0a040; --red: #e85454; --blue: #5a9bd8; --green: #6fd06f;
      --font: 'DM Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; overflow: hidden; }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 0 18px; height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border); -webkit-app-region: drag; flex-shrink: 0; }
    .logo { font-size: 17px; font-weight: 500; color: var(--accent); -webkit-app-region: no-drag; }
    .logo-sub { font-size: 9px; letter-spacing: 0.14em; color: var(--text3); }
    .hstats { display: flex; gap: 22px; -webkit-app-region: no-drag; }
    .hstat { text-align: center; }
    .hstat-val { font-size: 19px; font-weight: 500; color: var(--accent); }
    .hstat-label { font-size: 8px; letter-spacing: 0.1em; color: var(--text3); }

    .toolbar { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 8px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
    .tin { background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; color: var(--text); font-family: var(--font); font-size: 11px; padding: 7px 10px; outline: none; width: 80px; }
    .tin:focus { border-color: var(--accent); }
    .btn { background: var(--accent); border: none; border-radius: 3px; color: #0e0e0f; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 500; padding: 8px 16px; }
    .btn:hover:not(:disabled) { background: var(--accent2); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.ghost { background: none; border: 1px solid var(--border2); color: var(--text2); }
    .btn.ghost:hover { color: var(--text); }
    .btn.danger { background: none; border: 1px solid var(--red); color: var(--red); }

    .main { display: flex; flex: 1; overflow: hidden; }
    .results-wrap { flex: 1; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg2); border-bottom: 1px solid var(--border); color: var(--text3); font-size: 9px; letter-spacing: 0.1em; padding: 8px 10px; text-align: left; text-transform: uppercase; position: sticky; top: 0; z-index: 1; }
    td { border-bottom: 1px solid var(--border); padding: 8px 10px; font-size: 11px; vertical-align: middle; }
    tr:hover td { background: var(--bg2); }
    .ptitle { max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .badge { font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 2px; white-space: nowrap; }
    .badge.pending  { background: rgba(240,160,64,0.12); color: var(--warn); }
    .badge.review   { background: rgba(90,155,216,0.12); color: var(--blue); }
    .badge.ready    { background: rgba(200,240,74,0.12); color: var(--accent); }
    .badge.drafted  { background: rgba(111,208,111,0.12); color: var(--green); }
    .badge.posted   { background: var(--green); color: #0e0e0f; }
    .badge.no_match, .badge.post_error { background: rgba(232,84,84,0.12); color: var(--red); }
    .rbtn { background: none; border: 1px solid var(--border2); border-radius: 3px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 9px; padding: 3px 8px; }
    .rbtn:hover { color: var(--accent); border-color: var(--accent); }
    .empty { color: var(--text3); padding: 60px; text-align: center; }
    input[type="checkbox"] { accent-color: var(--accent); }

    .log-panel { width: 300px; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .log-head { padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg2); font-size: 9px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
    .log { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 10px; color: var(--text2); line-height: 1.7; }

    /* Review modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; width: 720px; max-height: 85vh; display: flex; flex-direction: column; }
    .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 14px; color: var(--accent); }
    .modal-body { padding: 18px; overflow-y: auto; }
    .cand { display: flex; gap: 12px; align-items: center; background: var(--bg3); border: 2px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
    .cand:hover { border-color: var(--border2); }
    .cand.selected { border-color: var(--accent); }
    .cand img { width: 56px; height: 56px; object-fit: contain; background: #fff; border-radius: 4px; }
    .modal-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
    .toast { background: var(--accent); color: #0e0e0f; font-size: 11px; padding: 9px 16px; border-radius: 3px; }
    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border2); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag">
      <div>
        <div class="logo">▲ zayndrop List</div>
        <div class="logo-sub">LISTING PIPELINE</div>
      </div>
      <select id="account-selector" style="background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:var(--font);font-size:10px;padding:4px 10px;outline:none;cursor:pointer;">
        <option value="acc1">Account 1</option>
      </select>
    </div>
    <div class="hstats">
      <div class="hstat"><div class="hstat-val" id="h-queue">0</div><div class="hstat-label">QUEUE</div></div>
      <div class="hstat"><div class="hstat-val" id="h-ready">0</div><div class="hstat-label">READY</div></div>
      <div class="hstat"><div class="hstat-val" id="h-review">0</div><div class="hstat-label">NEED REVIEW</div></div>
    </div>
    <div style="-webkit-app-region:no-drag"></div>
  </div>

  <div class="toolbar">
    <button class="btn ghost" id="select-all-btn">☑ ALL</button>
    <button class="btn" id="match-btn">⌕ MATCH ASINs</button>
    <div style="font-size:9px;color:var(--text3);letter-spacing:0.08em;padding-bottom:2px">PRICING MODE</div>
    <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);padding-bottom:4px;cursor:pointer">
      <input type="radio" name="price-mode" value="markup" id="mode-markup" checked /> Amazon markup
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);padding-bottom:4px;cursor:pointer">
      <input type="radio" name="price-mode" value="undercut" id="mode-undercut" /> Undercut competitor
    </label>
    <div class="field" id="markup-field"><label>Markup %</label><input class="tin" id="markup" type="number" value="30" min="1" max="500" /></div>
    <div class="field" id="undercut-field" style="display:none"><label>Undercut %</label><input class="tin" id="undercut-pct" type="number" value="5" min="1" max="50" /></div>
    <button class="btn" id="price-btn">$ PRICE</button>
    <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);padding-bottom:8px;cursor:pointer">
      <input type="checkbox" id="auto-submit" checked /> auto-submit ("List it")
    </label>
    <button class="btn" id="auto-run-btn" style="background:var(--accent);color:#000;font-weight:700">⚡ AUTO RUN</button>
    <button class="btn" id="post-btn" style="background:var(--green)">▲ POST</button>
    <button class="btn danger" id="stop-post-btn" style="display:none">■ STOP</button>
    <button class="btn ghost" id="test-title-btn" style="font-size:9px">✦ test AI title</button>
    <button class="btn" id="verify-btn">✓ VERIFY</button>
    <button class="btn ghost" id="mark-posted-btn">✔ MARK POSTED</button>
    <button class="btn danger" id="remove-btn">✕ REMOVE</button>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div style="font-size:9px;color:var(--text3);letter-spacing:0.08em;padding-bottom:2px">REFRESH LISTINGS</div>
    <div class="field"><label>Min age (days)</label><input class="tin" id="refresh-days" type="number" value="30" min="1" max="365" /></div>
    <div class="field"><label>Max to refresh</label><input class="tin" id="refresh-limit" type="number" value="10" min="1" max="100" /></div>
    <button class="btn" id="refresh-btn" style="border-color:#a78bfa;color:#a78bfa">⟳ REFRESH LISTINGS</button>
    <button class="btn danger" id="stop-refresh-btn" style="display:none">■ STOP</button>
  </div>

  <div class="main">
    <div class="results-wrap">
      <table>
        <thead><tr>
          <th style="width:28px"><input type="checkbox" id="check-all" /></th>
          <th>Product</th><th>Seller src</th><th>Comp $</th><th>AMZ cost</th>
          <th>Our $</th><th>Profit</th><th>ASIN</th><th>Status</th><th></th>
        </tr></thead>
        <tbody id="q-tbody"><tr><td colspan="10" class="empty">Queue is empty — send products from Scout</td></tr></tbody>
      </table>
    </div>
    <div class="log-panel">
      <div class="log-head">List Log</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<!-- ASIN review modal -->
<div class="modal-overlay hidden" id="review-modal">
  <div class="modal">
    <div class="modal-header"><span id="review-title">Review match</span><button class="rbtn" id="review-close">✕</button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:6px">
        <div style="font-size:9px;color:var(--text3);letter-spacing:0.1em">EBAY PRODUCT</div>
        <div id="review-ebay" style="margin-top:4px"></div>
      </div>
      <div style="font-size:9px;color:var(--text3);letter-spacing:0.1em;margin-bottom:8px">AMAZON CANDIDATES (cheapest first) — click to select</div>
      <div id="review-cands"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="review-approve" disabled>✓ APPROVE MATCH</button>
      <button class="btn ghost" id="review-skip">SKIP</button>
      <button class="btn danger" id="review-reject">NO GOOD MATCH</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
let queue = [];
let checked = new Set();
let reviewQueue = [];
let reviewIdx = 0;
let reviewSelection = null;
let currentAccountId = 'acc1';

async function initAccountSelector() {
  const sel = document.getElementById('account-selector');
  try {
    const accounts = await window.zayn.accountsGet();
    sel.innerHTML = accounts.map(a =>
      `<option value="${a.id}">${a.name || a.id}</option>`
    ).join('');
  } catch (_) {}
  sel.addEventListener('change', () => {
    currentAccountId = sel.value;
    load();
  });
}
function getAccOpts() { return { accountId: currentAccountId }; }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function logLine(text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
window.zayn.on('list-progress', p => logLine(p.text));

function render() {
  const tbody = document.getElementById('q-tbody');
  document.getElementById('h-queue').textContent = queue.length;
  document.getElementById('h-ready').textContent = queue.filter(q => q.status === 'ready' || q.status === 'drafted').length;
  document.getElementById('h-review').textContent = queue.filter(q => q.status === 'review').length;
  if (!queue.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">Queue is empty — send products from Scout</td></tr>';
    return;
  }
  tbody.innerHTML = queue.map(q => `
    <tr>
      <td><input type="checkbox" data-check="${q.id}" ${checked.has(q.id) ? 'checked' : ''} /></td>
      <td><span class="ptitle" title="${(q.title || '').replace(/"/g, '&quot;')}">${(q.title || '').slice(0, 55)}</span></td>
      <td style="font-size:10px;color:var(--text2)">${q.seller || '—'}</td>
      <td>${q.competitor_price ? '$' + (+q.competitor_price).toFixed(2) : '—'}</td>
      <td>${q.amazon_price ? '$' + (+q.amazon_price).toFixed(2) : '—'}</td>
      <td style="color:var(--accent)">${q.our_price ? '$' + (+q.our_price).toFixed(2) : '—'}</td>
      <td style="color:${(q.estimated_profit ?? 0) > 0 ? 'var(--green)' : 'var(--red)'}">${q.estimated_profit != null ? '$' + (+q.estimated_profit).toFixed(2) : '—'}</td>
      <td style="font-size:10px;color:${q.asin ? 'var(--accent)' : 'var(--text3)'}">${q.asin || (q.status === 'review' ? 'review →' : '—')}</td>
      <td><span class="badge ${q.status || 'pending'}">${(q.status || 'pending').toUpperCase()}</span>${q.verified_at ? ' <span title="verified live & unique ' + q.verified_at.slice(0, 10) + '" style="color:var(--green)">✓</span>' : ''}</td>
      <td>
        ${q.status === 'review' ? `<button class="rbtn" data-review="${q.id}">REVIEW</button>` : ''}
        ${['drafted', 'posted'].includes(q.status) ? `<button class="rbtn" data-verify="${q.id}" title="verify unique listing">^</button>` : ''}
      </td>
    </tr>`).join('');

  tbody.querySelectorAll('[data-check]').forEach(cb => cb.addEventListener('change', () => {
    const id = +cb.dataset.check;
    cb.checked ? checked.add(id) : checked.delete(id);
  }));

  // Click-and-drag to check/uncheck rows
  let dragSelecting = false;
  let dragValue = true; // true = check, false = uncheck
  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      const cb = row.querySelector('[data-check]');
      if (!cb) return;
      // If clicking directly on the checkbox let the change event handle it
      if (e.target === cb) return;
      e.preventDefault();
      dragSelecting = true;
      dragValue = !checked.has(+cb.dataset.check);
      const id = +cb.dataset.check;
      dragValue ? checked.add(id) : checked.delete(id);
      cb.checked = dragValue;
    });
    row.addEventListener('mouseover', () => {
      if (!dragSelecting) return;
      const cb = row.querySelector('[data-check]');
      if (!cb) return;
      const id = +cb.dataset.check;
      dragValue ? checked.add(id) : checked.delete(id);
      cb.checked = dragValue;
    });
  });
  document.addEventListener('mouseup', () => { dragSelecting = false; }, { once: false });
  tbody.querySelectorAll('[data-verify]').forEach(b => b.addEventListener('click', async () => {
    b.disabled = true; b.textContent = '⟳';
    try {
      const res = await window.zayn.listVerifyItem(+b.dataset.verify);
      if (!res.success) { toast('Verify failed: ' + res.error); }
      else {
        const icons = { live: '✓ LIVE & unique', ended: '⚠ ENDED', not_found: '✕ NOT FOUND', not_listed: '✕ NOT LISTED', duplicate: '⚠ DUPLICATES' };
        toast(`${icons[res.state] || res.state} — ${res.detail}`);
        logLine(`verify: ${icons[res.state] || res.state} — ${res.detail}`);
      }
    } catch (e) { toast('Verify error: ' + e.message); }
    b.disabled = false; b.textContent = '^';
    await load();
  }));
  tbody.querySelectorAll('[data-review]').forEach(b => b.addEventListener('click', () => {
    reviewQueue = queue.filter(q => q.status === 'review');
    reviewIdx = reviewQueue.findIndex(q => q.id === +b.dataset.review);
    openReview();
  }));
}

async function load() {
  queue = await window.zayn.listQueue(getAccOpts());
  for (const id of [...checked]) if (!queue.find(q => q.id === id)) checked.delete(id);
  render();
}

const selectedIds = () => checked.size ? [...checked] : queue.map(q => q.id);

document.getElementById('check-all').addEventListener('change', (e) => {
  checked = e.target.checked ? new Set(queue.map(q => q.id)) : new Set();
  render();
});
document.getElementById('select-all-btn').addEventListener('click', () => {
  checked = checked.size === queue.length ? new Set() : new Set(queue.map(q => q.id));
  render();
});

document.getElementById('match-btn').addEventListener('click', async () => {
  const ids = selectedIds();
  if (!ids.length) { toast('Nothing selected'); return; }
  const btn = document.getElementById('match-btn');
  btn.disabled = true; btn.textContent = '⟳ MATCHING...';
  const res = await window.zayn.listMatchAsins(ids, getAccOpts());
  btn.disabled = false; btn.textContent = '⌕ MATCH ASINs';
  toast(`${res.matched} items have candidates — review them`);
  await load();
});

document.getElementById('test-title-btn').addEventListener('click', async () => {
  const btn = document.getElementById('test-title-btn');
  btn.disabled = true; btn.textContent = '⟳ testing...';
  try {
    const res = await window.zayn.listTestTitle();
    if (res.ok) {
      logLine(`✦ AI title test OK (key: ${res.keyPrefix})`);
      logLine(`  → "${res.title}"`);
      toast(`AI title works: "${res.title.slice(0, 40)}..."`);
    } else {
      logLine(`✕ AI title test FAILED: ${res.error}`);
      toast(res.error, 'error');
    }
  } catch (e) {
    logLine('✕ ' + e.message);
    toast(e.message, 'error');
  }
  btn.disabled = false; btn.textContent = '✦ test AI title';
});

// Toggle pricing mode fields
document.querySelectorAll('input[name="price-mode"]').forEach(r => {
  r.addEventListener('change', () => {
    const undercut = document.getElementById('mode-undercut').checked;
    document.getElementById('markup-field').style.display = undercut ? 'none' : '';
    document.getElementById('undercut-field').style.display = undercut ? '' : 'none';
  });
});

function getPriceOptions() {
  const undercut = document.getElementById('mode-undercut').checked;
  return undercut
    ? { mode: 'undercut', undercutPct: +document.getElementById('undercut-pct').value || 5 }
    : { mode: 'markup',   markupPct:   +document.getElementById('markup').value || 30 };
}

document.getElementById('price-btn').addEventListener('click', async () => {
  const ids = selectedIds();
  if (!ids.length) { toast('Nothing selected'); return; }
  const options = getPriceOptions();
  const res = await window.zayn.listPriceItems({ ids, options, ...getAccOpts() });
  toast(`Priced ${res.priced}${res.skipped ? `, ${res.skipped} skipped (no competitor/Amazon price)` : ''}`);
  await load();
});

document.getElementById('auto-run-btn').addEventListener('click', async () => {
  const ids = selectedIds();
  if (!ids.length) { toast('Nothing selected'); return; }
  const markupPct = +document.getElementById('markup').value || 30;
  if (!confirm(`AUTO RUN ${ids.length} item(s)?\n\nThis will:\n1. Find the best Amazon match\n2. Price at ${markupPct}% markup\n3. Post directly to eBay\n\nItems go LIVE automatically.`)) return;
  const btn = document.getElementById('auto-run-btn');
  const stopBtn = document.getElementById('stop-post-btn');
  btn.disabled = true; btn.textContent = '⟳ RUNNING...';
  stopBtn.style.display = 'inline-block';
  const res = await window.zayn.listAutoRun({ ids, options: { markupPct, autoSubmit: true }, ...getAccOpts() });
  btn.disabled = false; btn.textContent = '⚡ AUTO RUN';
  stopBtn.style.display = 'none';
  toast(`Auto run: ${res.posted} listed, ${res.failed} failed, ${res.noMatch} no match`);
  await load();
});

document.getElementById('post-btn').addEventListener('click', async () => {
  const ids = selectedIds().filter(id => { const q = queue.find(x => x.id === id); return q?.our_price && q?.asin; });
  if (!ids.length) { toast('No items are ready (need ASIN + price)'); return; }
  const autoSubmit = document.getElementById('auto-submit').checked;
  const msg = autoSubmit
    ? `PUBLISH ${ids.length} listing(s) to eBay automatically?\n\nThey go LIVE — no draft review.`
    : `Open eBay listing drafts for ${ids.length} item(s)?\n\nDrafts open in the browser — you review and click "List it" on each.`;
  if (!confirm(msg)) return;
  const btn = document.getElementById('post-btn');
  const stopBtn = document.getElementById('stop-post-btn');
  btn.disabled = true; btn.textContent = '⟳ POSTING...';
  stopBtn.style.display = 'inline-block';
  const res = await window.zayn.listPostItems({ ids, options: { autoSubmit }, ...getAccOpts() });
  btn.disabled = false; btn.textContent = '▲ POST';
  stopBtn.style.display = 'none';
  toast(`${res.posted} ${autoSubmit ? 'processed' : 'drafts opened'}, ${res.failed} failed`);
  await load();
});

document.getElementById('stop-post-btn').addEventListener('click', async () => {
  await window.zayn.listStop();
  logLine('■ stop requested — finishing current item then halting');
  toast('Stopping after current item...');
});

document.getElementById('remove-btn').addEventListener('click', async () => {
  if (!checked.size) { toast('Check items to remove'); return; }
  await window.zayn.listRemoveItems([...checked]);
  checked.clear();
  await load();
});

document.getElementById('verify-btn').addEventListener('click', async () => {
  const ids = selectedIds();
  if (!ids.length) { toast('Nothing selected'); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true; btn.textContent = '⟳ VERIFYING...';
  let live = 0, notFound = 0, dupes = 0;
  for (const id of ids) {
    try {
      const res = await window.zayn.listVerifyItem(id);
      if (!res.success) { logLine(`✕ verify failed: ${res.error}`); continue; }
      const icons = { live: '✓ LIVE', ended: '⚠ ENDED', not_found: '✕ NOT FOUND', not_listed: '✕ NOT LISTED', duplicate: '⚠ DUPES' };
      logLine(`${icons[res.state] || res.state} — ${res.detail}`);
      if (res.state === 'live') live++;
      else if (res.state === 'not_listed' || res.state === 'not_found') notFound++;
      else if (res.state === 'duplicate') dupes++;
    } catch (e) { logLine(`✕ ${e.message}`); }
  }
  btn.disabled = false; btn.textContent = '✓ VERIFY';
  toast(`Verified: ${live} live, ${notFound} not found, ${dupes} dupes`);
  await load();
});

document.getElementById('mark-posted-btn').addEventListener('click', async () => {
  const ids = selectedIds();
  if (!ids.length) { toast('Nothing selected'); return; }
  if (!confirm(`Mark ${ids.length} item(s) as POSTED and add to listing bank?\n\nThis skips the eBay live-check.`)) return;
  await window.zayn.listMarkPosted(ids);
  toast(`${ids.length} item(s) marked as posted`);
  await load();
});

// ── Listing refresher ─────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const days = +document.getElementById('refresh-days').value || 30;
  const limit = +document.getElementById('refresh-limit').value || 10;
  if (!confirm(`Refresh up to ${limit} listings older than ${days} days?\n\nThis will END each old listing and RELIST it so it gets a fresh slot in eBay search.`)) return;
  const btn = document.getElementById('refresh-btn');
  const stopBtn = document.getElementById('stop-refresh-btn');
  btn.disabled = true; btn.textContent = '⟳ REFRESHING...';
  stopBtn.style.display = 'inline-block';
  logLine(`⟳ Starting listing refresh (min age: ${days}d, max: ${limit})…`);
  try {
    const onLog = (_, msg) => logLine(msg);
    window.zayn.onListLog(onLog);
    const res = await window.zayn.listRefresh({ days, limit, ...getAccOpts() });
    logLine(`✓ Refresh done — ${res.refreshed} refreshed, ${res.failed} failed, ${res.skipped} skipped`);
    toast(`${res.refreshed} listings refreshed`);
  } catch (e) {
    logLine('✕ ' + e.message);
    toast('Refresh error: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = '⟳ REFRESH LISTINGS';
  stopBtn.style.display = 'none';
  await load();
});

document.getElementById('stop-refresh-btn').addEventListener('click', async () => {
  await window.zayn.listStop();
  logLine('■ stop requested');
  toast('Stopping after current item...');
});

// ── Review modal ──────────────────────────────────────────────
function openReview() {
  const item = reviewQueue[reviewIdx];
  if (!item) { document.getElementById('review-modal').classList.add('hidden'); load(); return; }
  reviewSelection = null;
  document.getElementById('review-approve').disabled = true;
  document.getElementById('review-title').textContent = `Review match (${reviewIdx + 1}/${reviewQueue.length})`;
  document.getElementById('review-ebay').innerHTML =
    `<b>${item.title}</b><br><span style="color:var(--text2)">competitor price: ${item.competitor_price ? '$' + (+item.competitor_price).toFixed(2) : '?'} · seller: ${item.seller || '?'}</span>`;
  const cands = JSON.parse(item.candidates || '[]');
  document.getElementById('review-cands').innerHTML = cands.map((c, i) => `
    <div class="cand" data-cand="${i}">
      <img src="${c.image}" />
      <div style="flex:1">
        <div>${c.title.slice(0, 90)}</div>
        <div style="color:var(--text2);font-size:10px;margin-top:3px">
          <b style="color:var(--accent);font-size:13px">$${c.price.toFixed(2)}</b>
          ${c.prime ? ' · ✓ prime' : ' · ⚠ no prime'} · ${c.asin}
          ${item.competitor_price ? ` · margin ≈ $${((+item.competitor_price) * 0.87 - c.price).toFixed(2)}` : ''}
        </div>
      </div>
    </div>`).join('') || '<div class="empty">No candidates stored</div>';
  document.querySelectorAll('.cand').forEach(el => el.addEventListener('click', () => {
    document.querySelectorAll('.cand').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    reviewSelection = cands[+el.dataset.cand];
    document.getElementById('review-approve').disabled = false;
  }));
  document.getElementById('review-modal').classList.remove('hidden');
}

document.getElementById('review-approve').addEventListener('click', async () => {
  const item = reviewQueue[reviewIdx];
  await window.zayn.listUpdateItem({ id: item.id, patch: {
    asin: reviewSelection.asin, amazon_price: reviewSelection.price,
    amazon_title: reviewSelection.title, status: 'ready'
  }});
  reviewIdx++;
  openReview();
});
document.getElementById('review-skip').addEventListener('click', () => { reviewIdx++; openReview(); });
document.getElementById('review-reject').addEventListener('click', async () => {
  const item = reviewQueue[reviewIdx];
  await window.zayn.listUpdateItem({ id: item.id, patch: { status: 'no_match' } });
  reviewIdx++;
  openReview();
});
document.getElementById('review-close').addEventListener('click', () => {
  document.getElementById('review-modal').classList.add('hidden');
  load();
});

initAccountSelector().then(() => load());
setInterval(load, 15000);
</script>
</body>
</html>
